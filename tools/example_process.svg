<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa"/>

  <!-- 标题 -->
  <text x="400" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#333">示例工艺流程图</text>

  <!-- 管道线 -->
  <line id="PIPE_INLET" x1="50" y1="200" x2="200" y2="200" stroke="#007AFF" stroke-width="6" stroke-linecap="round"/>
  <line id="PIPE_MID"   x1="200" y1="200" x2="350" y2="200" stroke="#007AFF" stroke-width="6" stroke-linecap="round"/>
  <line id="PIPE_OUT"   x1="450" y1="200" x2="700" y2="200" stroke="#007AFF" stroke-width="6" stroke-linecap="round"/>

  <!-- 泵 PUMP_A01 -->
  <g id="PUMP_A01">
    <circle cx="200" cy="200" r="40" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <text x="200" y="195" text-anchor="middle" font-size="12" fill="#333">P01</text>
    <text x="200" y="210" text-anchor="middle" font-size="10" fill="#666">循环泵 A</text>
  </g>

  <!-- 阀门 VALVE_C01 (调节阀) -->
  <g id="VALVE_C01">
    <rect x="340" y="175" width="20" height="50" rx="3" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <polygon points="370,200 350,180 350,220" fill="#666" stroke="#333" stroke-width="1"/>
    <text x="350" y="250" text-anchor="middle" font-size="10" fill="#666">调节阀 C01</text>
  </g>

  <!-- 阀门 VALVE_V02 (开关阀) -->
  <g id="VALVE_V02">
    <rect x="540" y="175" width="20" height="50" rx="3" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <line x1="540" y1="200" x2="560" y2="200" stroke="#333" stroke-width="3"/>
    <text x="550" y="250" text-anchor="middle" font-size="10" fill="#666">开关阀 V02</text>
  </g>

  <!-- 液罐 TANK_01 -->
  <g id="TANK_01">
    <rect x="100" y="350" width="120" height="150" rx="5" fill="#d4e6f1" stroke="#333" stroke-width="2"/>
    <line x1="100" y1="370" x2="220" y2="370" stroke="#87CEEB" stroke-width="2"/>
    <text x="160" y="415" text-anchor="middle" font-size="14" fill="#333">液罐</text>
    <text x="160" y="435" text-anchor="middle" font-size="10" fill="#666">T-01</text>
    <!-- 液位指示 -->
    <rect x="105" y="380" width="110" height="100" fill="#87CEEB" opacity="0.6"/>
  </g>

  <!-- 风扇 FAN_01 -->
  <g id="FAN_01">
    <circle cx="650" cy="200" r="35" fill="#e0e0e0" stroke="#333" stroke-width="2"/>
    <text x="650" y="195" text-anchor="middle" font-size="11" fill="#333">F01</text>
    <text x="650" y="210" text-anchor="middle" font-size="9" fill="#666">排风扇</text>
    <!-- 扇叶 -->
    <ellipse cx="650" cy="190" rx="25" ry="8" fill="#aaa" opacity="0.5" transform="rotate(30,650,190)"/>
  </g>

  <!-- 图例 -->
  <g transform="translate(600, 450)">
    <text x="0" y="0" font-size="12" font-weight="bold" fill="#333">图例</text>
    <rect x="0" y="10" width="15" height="15" fill="#00cc00" stroke="#333"/>
    <text x="20" y="23" font-size="11" fill="#666">运行/开启</text>
    <rect x="0" y="35" width="15" height="15" fill="#cc0000" stroke="#333"/>
    <text x="20" y="48" font-size="11" fill="#666">停止/关闭</text>
    <text x="0" y="70" font-size="11" fill="#999">右键设备进行控制</text>
  </g>
</svg>
